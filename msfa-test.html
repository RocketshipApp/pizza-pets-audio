      Object.keys(cartridges).forEach((key) => {
        const child = document.createElement('option');
        child.value = key;
        child.innerText = key;
        cartridgeSelect.appendChild(child);
      });

      const LSB_PITCH_BITS = 1 << 7;
      const PITCH_MAX = ((LSB_PITCH_BITS + 1) * 127);
      pitch.setAttribute('min', 0);
      pitch.setAttribute('max', PITCH_MAX);
      pitch.setAttribute('value', PITCH_MAX / 2);
      let lsb = 0;
      let msb = 0;
      pitch.addEventListener('input', async (e) => {
        await audioPromise;
        lsb = e.target.value % LSB_PITCH_BITS;
        msb = Math.floor(e.target.value / LSB_PITCH_BITS);
        synth.port.postMessage({ pitchBend: true, lsb, msb });
      });

      volume.addEventListener('input', async (e) => {
        await audioPromise;
        const volume = e.target.value / 127;
        synth.port.postMessage({ setVolume: true, volume });
      });

      modulation.addEventListener('input', async (e) => {
        await audioPromise;
        synth.port.postMessage({ controlChange: true, number: 1, value: e.target.value });
      });

      cartridgeSelect.addEventListener('change', async (e) => {
        await audioPromise;
        synth.port.postMessage({ load: cartridges[e.target.value] });
      });

      patchSelect.addEventListener('change', async (e) => {
        await audioPromise;
        synth.port.postMessage({ changePatch: true, patch: e.target.value });
      });

      const onCartridgeLoaded = (patches) => {
        patchSelect.toggleAttribute('disabled', false);
        play.toggleAttribute('disabled', false);
        Array.from(patchSelect.children).forEach(child => child.remove());
        for (let i = 0, length = patches.length; i < length; i++) {
          const child = document.createElement('option');
          child.value = i;
          child.innerText = patches[i];
          patchSelect.appendChild(child);
        }
      };

      let initialized = false;
      document.body.addEventListener('click', async () => {
        if (initialized) { 
          return;
        }

        context = new AudioContext({ sampleRate: 48000 });
        await context.audioWorklet.addModule('./dx7-processor.js');
        synth = new AudioWorkletNode(context, 'dx7');
        synth.connect(context.destination);
        synth.port.onmessage = (e) => {
          console.log("Message received from synth worker", e.data);
          if (e.data.cartridgeLoaded) {
            onCartridgeLoaded(e.data.patches);
          }
        };
        initialized = true;
        audioResolve();
        pitch.toggleAttribute('disabled', false);
        volume.toggleAttribute('disabled', false);
        modulation.toggleAttribute('disabled', false);
        note.toggleAttribute('disabled', false);
        console.log(`audio is ${context.state}`);
      });

      document.getElementById('play').addEventListener('click', () => {
        lastNote = note.value;
        synth.port.postMessage({ play: true, note: lastNote, velocity: velocity.value });
      });

      document.getElementById('stop').addEventListener('click', () => {
        synth.port.postMessage({ stop: true, note: lastNote });
      });

      document.getElementById('terminate').addEventListener('click', () => {
        synth.port.postMessage({ terminate: true });
      });
    </script>
  </body>
</html>
