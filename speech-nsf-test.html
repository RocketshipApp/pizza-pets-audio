        const trackSelect = document.getElementById('track-select');
        trackSelect.toggleAttribute('disabled', false);
        const playNSF = document.getElementById('play-nsf')
        playNSF.toggleAttribute('disabled', false);
        Array.from(trackSelect.children).forEach(child => child.remove());
        for (let i = 0, length = tracks; i < length; i++) {

        await context.audioWorklet.addModule('./nsf-player-processor.js');
        nsf = new AudioWorkletNode(context, 'nsf-player');
        nsf.connect(context.destination);
